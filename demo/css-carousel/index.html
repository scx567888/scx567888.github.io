<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>纯 CSS 实现轮播效果</title>
    <style>

        .app {
            display: flex;
            flex-direction: column;
            row-gap: 10px;
        }

        /* 最外层包装容器, 用来隐藏滚动条 */
        .carousel-wrapper {
            overflow: hidden;
        }

        /* 滚动动画 不停向左滚动 滚动到一半 */
        @keyframes carousel-slide {
            0% {
                transform: translateX(0%)
            }
            100% {
                transform: translateX(-50%)
            }
        }

        /* 滚动动画 不停向右滚动 滚动到一半 */
        @keyframes carousel-slide-reverse {
            0% {
                transform: translateX(-50%)
            }
            100% {
                transform: translateX(0%)
            }
        }

        /* 滚动容器 */
        .carousel,
        .carousel-reverse {
            display: flex;
            /* 宽度需要设置为实际滚动内容的两倍 */
            width: 200%;
        }

        .carousel {
            /* 动画 这里 5秒 一循环 */
            animation: carousel-slide 5s infinite linear;
        }

        .carousel-reverse {
            /* 动画 这里 5秒 一循环 */
            animation: carousel-slide-reverse 5s infinite linear;
        }

        /* 鼠标移入时暂停滚动动画 */
        .carousel:hover,
        .carousel-reverse:hover,
        .carousel.active,
        .carousel-reverse.active {
            /* 暂停动画 */
            animation-play-state: paused;
        }

        .carousel-half {
            display: flex;
            /* 这里的宽度需要占满可视区域 否则会出现空缺 */
            width: 100%;
        }

        /* 元素本体 这里的样式可以随便写 */
        .carousel-item {
            display: flex;
            flex: 1;
            justify-content: center;
            align-items: center;
            padding-left: 5px;
            padding-right: 5px;
        }

        .card1,
        .card2,
        .card3,
        .card4,
        .card5,
        .card6,
        .card7 {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            color: white;
            transition: all 150ms ease-in-out;
            box-sizing: border-box;
        }

        .card1 {
            border: 5px solid #ff8080;
            background: #f83434;
        }

        .card2 {
            border: 5px solid #fd9e62;
            background: #ff6200;
        }

        .card3 {
            border: 5px solid #ffd900;
            background: #ffbf24;
        }

        .card4 {
            border: 5px solid #28be00;
            background: green;
        }

        .card5 {
            border: 5px solid #03f3fc;
            background: #00b8be;
        }

        .card6 {
            border: 5px solid #008cdd;
            background: #004b80;
        }

        .card7 {
            border: 5px solid #b72bfe;
            background: #7b00be;
        }

        /* hover 时我们改变一下样式 */
        .card1:hover,
        .card2:hover,
        .card3:hover,
        .card4:hover,
        .card5:hover,
        .card6:hover,
        .card7:hover {
            transform: scale(0.9);
            border-width: 7px;
        }

    </style>
</head>
<body>

<div class="app">

    <div class="carousel-wrapper">

        <div class="carousel">

            <div class="carousel-half">

                <div class="carousel-item">
                    <div class="card1">
                        <h1>1</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card2">
                        <h1>2</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card3">
                        <h1>3</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card4">
                        <h1>4</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card5">
                        <h1>5</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card6">
                        <h1>6</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card7">
                        <h1>7</h1>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <div class="carousel-wrapper">

        <div class="carousel-reverse">

            <div class="carousel-half">

                <div class="carousel-item">
                    <div class="card7">
                        <h1>7</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card6">
                        <h1>6</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card5">
                        <h1>5</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card4">
                        <h1>4</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card3">
                        <h1>3</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card2">
                        <h1>2</h1>
                    </div>
                </div>

                <div class="carousel-item">
                    <div class="card1">
                        <h1>1</h1>
                    </div>
                </div>

            </div>

        </div>

    </div>

</div>

<script>
    // 这里如果不想再手动复制一份 滚动内容 的 html 代码的话, 可以对 滚动内容 进行克隆
    window.addEventListener("load", () => {
        const app = document.querySelector(".app");
        const carouselWrapperElement = document.querySelectorAll(".carousel-wrapper");
        for (let i = 0; i < 10; i++) {
            for (let o of carouselWrapperElement) {
                app.appendChild(o.cloneNode(true))
            }
        }
        const carouselElementList = document.querySelectorAll(".carousel");
        for (let o of carouselElementList) {
            o.appendChild(o.querySelector(".carousel-half").cloneNode(true));
            o.addEventListener("click", (e) => {
                if (o.classList.contains("active")) {
                    o.classList.remove("active");
                } else {
                    o.classList.add("active");
                }
            });
        }
        const carouselReverseElementList = document.querySelectorAll(".carousel-reverse");
        for (let o of carouselReverseElementList) {
            o.appendChild(o.querySelector(".carousel-half").cloneNode(true));
            o.addEventListener("click", (e) => {
                if (o.classList.contains("active")) {
                    o.classList.remove("active");
                } else {
                    o.classList.add("active");
                }
            });
        }


    });
</script>
</body>
</html>
