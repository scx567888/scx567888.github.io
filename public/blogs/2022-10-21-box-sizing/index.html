<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Box Sizing</title>
    <link href="../core/normalize.css" rel="stylesheet">
</head>
<body>
<div style="padding: 10px;line-height: 1.5rem;font-weight: bold">
    在多数浏览器的盒子模型中 box-sizing 默认为 content-box (这应该是一种 "错误的设计")
    <br>
    但这会在实际开发中导致很多让人意想不到的 "错误" , 尤其是在为元素设置高度或宽度的时候
    <br>
    这里我们推荐将默认的 box-sizing 设置为 border-box 以便统一, 并减少混淆
    <br>
    如下所示 :
</div>
<div style="display: flex;height: 500px;width:1400px;position:absolute;padding: 20px;column-gap: 20px">
    <div style="width: 50%;">
        <h4> 默认状态 (div1 和 div2 中的 padding 会导致整体的宽高变大并溢出父元素)</h4>
        <iframe src="default.html" style="width: 100%;height: 100%"></iframe>
    </div>
    <div style="width: 50%;">
        <h4> 将 box-sizing 设置为 border-box (此处也提供了一个 <a href="../core/normalize.css">简单的 CSS</a> 用来实现重置效果)
        </h4>
        <iframe src="use-normalize.html" style="width: 100%;height: 100%"></iframe>
    </div>

</div>
</body>
</html>
