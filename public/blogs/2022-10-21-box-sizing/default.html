<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Default</title>
    <style>
        .wrapper {
            width: 400px;
            height: 200px;
            border-style: solid;
            border-color: red;
            border-width: 2px;
            display: flex;
        }

        .div1 {
            height: 100%;
            width: 50%;
            background: #ff9bb4;
            padding: 10px;
        }

        .div2 {
            height: 100%;
            width: 50%;
            background: #87c2fd;
            padding: 10px;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="div1">
        div1
    </div>
    <div class="div2">
        div2
    </div>
</div>
</body>
</html>
